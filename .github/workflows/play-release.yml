name: Play Release (AAB)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Configure release signing (if secrets present)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
            {
              echo "storeFile=$RUNNER_TEMP/upload.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > keystore.properties
            echo "Release signing configured."
          else
            echo "No KEYSTORE_BASE64 secret found — bundle will be debug-signed (not uploadable to Play)."
          fi

      - name: Build release AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: Stage AAB
        run: cp app/build/outputs/bundle/release/app-release.aab sonora-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonora-release-aab
          path: sonora-release.aab

      # NOT action-gh-release: this job and "Build APK" run on the same tag, and when
      # both try to *create* the release one loses the race and its asset ends up on a
      # stray draft (v1.9.5 shipped without its APK that way, which breaks the in-app
      # updater). Build APK owns creating the release; this job only waits and uploads.
      - name: Attach AAB to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          for i in $(seq 1 30); do
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" sonora-release.aab --clobber
              exit 0
            fi
            echo "Release $TAG not there yet, waiting… ($i/30)"
            sleep 10
          done
          echo "::error::Release $TAG never appeared — Build APK must have failed."
          exit 1
