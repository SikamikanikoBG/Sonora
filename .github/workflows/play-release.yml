name: Play Release (AAB)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Configure release signing (if secrets present)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
            {
              echo "storeFile=$RUNNER_TEMP/upload.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > keystore.properties
            echo "Release signing configured."
          else
            echo "No KEYSTORE_BASE64 secret found — bundle will be debug-signed (not uploadable to Play)."
          fi

      - name: Build release AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: Stage AAB
        run: cp app/build/outputs/bundle/release/app-release.aab sonora-release.aab

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sonora-release-aab
          path: sonora-release.aab

      - name: Attach AAB to release
        uses: softprops/action-gh-release@v2
        with:
          files: sonora-release.aab
